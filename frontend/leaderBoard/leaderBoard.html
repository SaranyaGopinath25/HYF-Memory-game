<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Chewy&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../index.css" />
    <link rel="stylesheet" href="leaderBoard.css" />
    <link rel="stylesheet" href="../game/game.css" />
    <title>Memory game</title>
  </head>
  <body>
    <h1>🏆 Leaderboard 🏆</h1>

    <!-- Levels -->
    <div class="levels">
      <div class="level-card easy active">Easy</div>
      <div class="level-card medium">Medium</div>
      <div class="level-card hard">Hard</div>
    </div>

    <!-- Leaderboard List -->
    <div class="leaderboard">
      <div class="player">
        <div class="player-info">
          <span class="rank">1</span>
          <div class="avatar">M</div>
          <span>Max</span>
        </div>
        <div class="xp">1872 XP</div>
      </div>

      <div class="player">
        <div class="player-info">
          <span class="rank">2</span>
          <div class="avatar">C</div>
          <span>Chloe</span>
        </div>
        <div class="xp">1467 XP</div>
      </div>

      <div class="player">
        <div class="player-info">
          <span class="rank">3</span>
          <div class="avatar">T</div>
          <span>Tom</span>
        </div>
        <div class="xp">1283 XP</div>
      </div>
    </div>

    <!-- Bottom Navbar -->
    <div class="bottom-nav">
      <a href="../index.html">🏠 Home</a>
      <a id="level-page" href="../levels/levels.html">🎮 Levels</a>
      <a href="#" class="active">🏆 Leaderboard</a>
    </div>

    <script src="leaderBoard.js"></script>
