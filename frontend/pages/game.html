<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Chewy&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../css/index.css">
    <link rel="stylesheet" href="../css/game.css">
    <title>Memory Game</title>
</head>
<body>
    <!-- Screen 3 : Game Screen -->
        <div id="game">
          <div id="victory-overlay" class="hidden">
            <div class="victory-box">
              <h2>🎉 Congratulations!</h2>
              <p>You completed the game!</p>
              <p>Moves: <span id="final-score"></span></p>
              <p>Time: <span id="final-time"></span>s</p>
              <a href="levels.html">
                  <button>Play Again</button>
              </a>
            </div>
          </div>
          <div class="score-panel"> 
            <div class="score">Moves: <span id="score">0</span></div>
            <div class="timer">Time: <span id="time">0</span>s</div>
          </div>
          <div class="game-board">
            <!-- Cards will be generated here -->
             <div class="card">
                <div class="card-inner" onclick="setUpCardImages(this);">
                    <div class="front">
                        Front
                    </div>
                    <div class="back" >
                        <div id="cardImg">  </div>
                        
                    </div>
                </div>
             </div>
            </div>
            <a href="levels.html">
                <button id="back-btn">Back</button>
            </a>
          </div>
        </div>
    <script src="../js/script.js"></script>
</body>
</html>
