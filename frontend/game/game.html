<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Chewy&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../index.css">
    <link rel="stylesheet" href="game.css">
    <title>Memory Game</title>
</head>
<body>
    <div id="game">
        <!-- Score Panel -->
        <div class="score-panel">
            <div class="stat">
                <span class="stat-label">Moves</span>
                <span class="stat-value" id="moves">0</span>
            </div>
            <div class="stat">
                <span class="stat-label">Score</span>
                <span class="stat-value" id="score">0</span>
            </div>
            <div class="stat">
                <span class="stat-label">Time</span>
                <span class="stat-value" id="time">0</span>
            </div>
        </div>

        <!--Board spinner-->
        <div class="spinner-wrapper" id="board-spinner">
            <div class="spinner"></div>
            <span class="spinner-label">Loading cards…</span>
        </div>
        <!-- Game Board -->
        <div class="game-board">
            <div class="card" style="display:none">
                <div class="card-inner">
                    <div class="front">
                        <img src="../assets/HYF.png" alt="Card Front">
                    </div>
                    <div class="back">
                        <img id="cardImg" src="" alt="Card Back">
                    </div>
                </div>
            </div>
        </div>

        <!-- Back Button -->
        <a class="level-page" href="../levels/levels.html">
            <button id="back-btn">Back</button>
        </a>

    </div>

    <script src="game.js"></script>
</body>
</html>
